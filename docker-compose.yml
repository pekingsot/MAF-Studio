services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maf-studio-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=192.168.1.250;Port=5433;Database=mafstudio;Username=pekingsot;Password=sunset@123;Timezone=Asia/Shanghai
      - Workspace__BaseDir=/app/workspace
      - Jwt__Key=${JWT_SECRET:-your-super-secret-key-with-at-least-32-characters}
      - Jwt__Issuer=MAFStudio
      - Jwt__Audience=MAFStudio
      - Jwt__ExpirationInMinutes=1440
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    volumes:
      - /home/pekingost/workspace:/app/workspace
      - /home/pekingost/.ssh:/root/.ssh:ro
      - /home/pekingost/.gitconfig:/root/.gitconfig:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: maf-studio-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  infinity:
    image: michaelf34/infinity:latest
    container_name: maf-studio-infinity
    restart: unless-stopped
    ports:
      - "${INFINITY_PORT:-7997}:7997"
    volumes:
      - infinity_data:/app/.cache
    environment:
      - INFINITY_MODEL_ID=BAAI/bge-m3
      - INFINITY_RERANK_MODEL_ID=BAAI/bge-reranker-v2-m3
      - INFINITY_ENGINE=optimum
      - INFINITY_BATCH_SIZE=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7997/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maf-studio-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
    driver: local
  infinity_data:
    driver: local
